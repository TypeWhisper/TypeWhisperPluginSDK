name: Swift Package CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swift-package-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Package
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: "26.3"

      - name: Build package
        run: swift build

      - name: Run package tests
        run: |
          if [ -d Tests ]; then
            swift test
          else
            echo "No Tests directory; skipping swift test."
          fi
